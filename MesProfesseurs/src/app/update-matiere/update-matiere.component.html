<form>
  <div [hidden]="ajout">
    <label>ID Matiere</label>
    <input
      type="text"
      [readOnly]="!ajout"
      [(ngModel)]="matiere.idMat"
      name="idMatiere"
      class="form-control w-25"
    />
  </div>
  <div>
    <label>Nom Catégorie</label>
    <input
      type="text"
      [(ngModel)]="matiere.nomMatiere"
      name="nomMatiere"
      class="form-control"
      placeholder="Entrez un nom de catégorie..."
    />
  </div>
  <div class="mt-2">
    <button
      type="submit"
      [disabled]="!matiere.nomMatiere"
      class="btn btn-success"
      (click)="saveMatiere()"
    >
      {{ ajout ? "Ajouter" : "Modifier" }}
    </button>
  </div>
</form>
